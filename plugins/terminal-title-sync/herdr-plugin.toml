id = "par.terminal-title-sync"
name = "Terminal Title Sync"
version = "0.1.0"
min_herdr_version = "0.7.0"
description = "Set the outer terminal title from the focused agent, tab, or workspace (agent_title > tab_title > space_title)."
platforms = ["macos", "linux"]

# Manual refresh from any workspace/tab/pane context.
[[actions]]
id = "refresh"
title = "Refresh terminal title"
contexts = ["workspace", "tab", "pane"]
command = ["bun", "sync-title.ts"]

# Re-resolve whenever a change could affect the focused pane's title.
[[events]]
on = "workspace.focused"
command = ["bun", "sync-title.ts"]

[[events]]
on = "workspace.renamed"
command = ["bun", "sync-title.ts"]

[[events]]
on = "workspace.updated"
command = ["bun", "sync-title.ts"]

[[events]]
on = "tab.focused"
command = ["bun", "sync-title.ts"]

[[events]]
on = "tab.renamed"
command = ["bun", "sync-title.ts"]

[[events]]
on = "pane.focused"
command = ["bun", "sync-title.ts"]

[[events]]
on = "pane.agent_detected"
command = ["bun", "sync-title.ts"]

[[events]]
on = "pane.agent_status_changed"
command = ["bun", "sync-title.ts"]

[[events]]
on = "pane.moved"
command = ["bun", "sync-title.ts"]

[[events]]
on = "pane.created"
command = ["bun", "sync-title.ts"]

[[events]]
on = "pane.closed"
command = ["bun", "sync-title.ts"]
